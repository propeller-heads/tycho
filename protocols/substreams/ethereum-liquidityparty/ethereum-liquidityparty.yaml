specVersion: v0.1.0
package:
  name: "ethereum_liquidityparty"
  version: v0.1.3
  url: "https://github.com/propeller-heads/tycho-protocol-sdk/tree/main/substreams/ethereum-liquidityparty"

protobuf:
  files:
    - tycho/evm/v1/common.proto
    - tycho/evm/v1/utils.proto
  importPaths:
    - ../../../proto

binaries:
  default:
    type: wasm/rust-v1
    file: ../target/wasm32-unknown-unknown/release/ethereum_liquidityparty.wasm

network: mainnet
networks:
  mainnet:
    params:
      map_protocol_components: planner=0x5E9DB9fa66aeA7f254d4A6783b1a6180C4B8AAe3&info=0xefF3Ed388D3887e7C9F375B7f1ad8A0B77C05643&extra_impl1=0xAcb7089D62b67545299842bc7133582f8bE9eB86&extra_impl2=0x669a9B0cBdEFb31380b912C1dF3b77fA7C18D821
      map_protocol_changes: planner=0x5E9DB9fa66aeA7f254d4A6783b1a6180C4B8AAe3&info=0xefF3Ed388D3887e7C9F375B7f1ad8A0B77C05643&extra_impl1=0xAcb7089D62b67545299842bc7133582f8bE9eB86&extra_impl2=0x669a9B0cBdEFb31380b912C1dF3b77fA7C18D821

modules:
  - name: map_protocol_components
    kind: map
    initialBlock: 25301753
    inputs:
      - params: string
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:tycho.evm.v1.BlockTransactionProtocolComponents

  - name: store_protocol_components
    kind: store
    initialBlock: 25301753
    updatePolicy: set
    valueType: string
    inputs:
      - map: map_protocol_components

  - name: map_killed_components
    kind: map
    initialBlock: 25301753
    inputs:
      - source: sf.ethereum.type.v2.Block
      - store: store_protocol_components
    output:
      type: proto:tycho.evm.v1.BlockTransactionProtocolComponents

  - name: store_killed_components
    kind: store
    initialBlock: 25301753
    updatePolicy: set
    valueType: int64
    inputs:
      - map: map_killed_components

  - name: map_relative_component_balance
    kind: map
    initialBlock: 25301753
    inputs:
      - source: sf.ethereum.type.v2.Block
      - store: store_protocol_components
      - store: store_killed_components
    output:
      type: proto:tycho.evm.v1.BlockBalanceDeltas

  - name: store_balances
    kind: store
    initialBlock: 25301753
    updatePolicy: add
    valueType: bigint
    inputs:
      - map: map_relative_component_balance

  - name: map_protocol_changes
    kind: map
    initialBlock: 25301753
    inputs:
      - params: string
      - source: sf.ethereum.type.v2.Block
      - map: map_protocol_components
      - map: map_killed_components
      - map: map_relative_component_balance
      - store: store_protocol_components
      - store: store_balances
        mode: deltas
    output:
      type: proto:tycho.evm.v1.BlockChanges
