substreams_yaml_path: ./substreams.yaml
protocol_system: "baseline"
module_name: "map_protocol_changes"
protocol_type_names:
  - "baseline"
implementation_type: Custom
skip_balance_check: true # Baseline is singleton-style; component liquidity is indexed from relay events, not component-address balances.

tests:
  - name: test_reppo_pool_creation
    # Pool creation is enough for native simulation: getQuoteState(REPPO)
    # is already routed at this block, so creation emits quote-state attributes.
    start_block: 46596026
    stop_block: 46596026
    expected_components:
      - id: "0xff8104251e7761163fac3211ef5583fb3f8583d6"
        tokens:
          - "0xff8104251e7761163fac3211ef5583fb3f8583d6"
          - "0x0b3e328455c4059eeb9e3f84b5543f74e24e7e1b"
        static_attributes:
          relay: "0xc81Fd894C0acE037d133aF4886550aC8133568E8"
          reserve: "0x0b3e328455c4059eeb9e3f84b5543f74e24e7e1b"
          manual_updates: "0x01"
        creation_tx: "0x7c2b4d0dc9bce17b44e60618e6423cb2c081cf60b6f8e4cf93e23aa61f15e0e2"
        skip_simulation: false
        skip_execution: true # Base execution still needs executor address/config validation.
