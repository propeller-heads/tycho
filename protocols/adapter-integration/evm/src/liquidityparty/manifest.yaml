author:
  name: Tim Olson
  email: tim@dexorder.com

constants:
  # This is our median gas cost for a 10-asset pool. Gas varies by pool size from 120k to 200k.
  protocol_gas: 150857
  capabilities:
    - SellSide
    - BuySide
    - PriceFunction
    - MarginalPrice

contract: LiquidityPartySwapAdapter.sol

# Deployment instances used to generate chain specific bytecode.
instances:
  - chain:
      name: mainnet
      id: 1
    arguments:
      - "0x5E9DB9fa66aeA7f254d4A6783b1a6180C4B8AAe3"  # PartyPlanner
      - "0xefF3Ed388D3887e7C9F375B7f1ad8A0B77C05643"  # PartyInfo
