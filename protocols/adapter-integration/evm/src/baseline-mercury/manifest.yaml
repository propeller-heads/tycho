# information about the author helps us reach out in case of issues.
author:
  name: Baseline
  email: indigo.eth@protonmail.com

# Protocol Constants
constants:
  protocol_gas: 30000
  capabilities:
    - SellSide
    - BuySide

# The file containing the adapter contract
contract: BaselineSwapAdapter.sol

# Deployment instances used to generate chain specific bytecode.
instances:
  - chain:
      name: base
      id: 8453
    arguments:
      - "0xc81Fd894C0acE037d133aF4886550aC8133568E8"

# Specify automatic test cases because getPoolIds and getTokens are not
# implemented in the first adapter milestone.
tests:
  instances:
    - pool_id: "0xFf8104251E7761163faC3211eF5583FB3F8583d6"
      sell_token: "0x0b3e328455c4059EEb9e3f84b5543F74E24e7E1b"
      buy_token: "0xFf8104251E7761163faC3211eF5583FB3F8583d6"
      block: 46767428
      chain:
        id: 8453
        name: base
